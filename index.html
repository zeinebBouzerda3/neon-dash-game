<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON DASH – Cyber Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cyan:#00f5ff;--pink:#ff0080;--yellow:#ffea00;
  --purple:#8b00ff;--green:#00ff88;--dark:#03050f;--mid:#0a0f2e;
}
body{background:var(--dark);font-family:'Orbitron',monospace;overflow:hidden;touch-action:none;user-select:none}
#gameCanvas{display:block;width:100vw;height:100vh}

/* HUD */
#ui-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;pointer-events:none}
#hud{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 20px;pointer-events:none}
#score-block{display:flex;flex-direction:column}
#score-label{font-size:9px;letter-spacing:4px;color:var(--cyan);opacity:.7;text-transform:uppercase}
#score-display{font-size:34px;font-weight:900;color:#fff;text-shadow:0 0 20px var(--cyan),0 0 40px var(--cyan);line-height:1}
#best-row{font-size:9px;color:rgba(0,245,255,.45);letter-spacing:2px;margin-top:2px}
#coin-block{display:flex;align-items:center;gap:8px;background:rgba(0,245,255,.07);border:1px solid rgba(0,245,255,.2);border-radius:30px;padding:8px 14px}
#coin-icon{width:16px;height:16px;background:var(--yellow);border-radius:50%;box-shadow:0 0 10px var(--yellow);animation:pulse 1.2s ease-in-out infinite}
#coin-display{font-size:15px;font-weight:700;color:var(--yellow)}
#speed-block{text-align:right}
#speed-label{font-size:9px;letter-spacing:4px;color:var(--pink);opacity:.7}
#speed-display{font-size:18px;font-weight:700;color:var(--pink);text-shadow:0 0 15px var(--pink)}

/* Lives */
#lives-bar{position:absolute;top:80px;left:20px;display:flex;gap:8px;align-items:center}
#lives-label{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.3);margin-right:4px}
.life-orb{width:12px;height:12px;border-radius:50%;background:var(--pink);box-shadow:0 0 8px var(--pink);transition:all .3s}
.life-orb.dead{background:#1a0a0a;box-shadow:0 0 4px rgba(255,0,128,.2)}

/* Boost bar */
#boost-container{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);width:180px;text-align:center}
#boost-label{font-size:8px;letter-spacing:3px;color:var(--purple);margin-bottom:5px}
#boost-track{width:100%;height:5px;background:rgba(139,0,255,.15);border-radius:3px;border:1px solid rgba(139,0,255,.35);overflow:hidden}
#boost-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--cyan));border-radius:3px;width:0%;transition:width .1s;box-shadow:0 0 6px var(--purple)}
#boost-ready{font-size:8px;letter-spacing:2px;color:var(--yellow);margin-top:4px;opacity:0;transition:opacity .3s}

/* Pause button */
#pause-btn{position:absolute;top:18px;left:50%;transform:translateX(-50%);background:rgba(0,245,255,.08);border:1px solid rgba(0,245,255,.2);border-radius:20px;padding:6px 16px;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:3px;color:rgba(0,245,255,.6);cursor:pointer;pointer-events:all;transition:all .2s}
#pause-btn:hover{background:rgba(0,245,255,.15);color:var(--cyan)}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(10px);background:rgba(3,5,15,.92);transition:opacity .4s}
.screen.hidden{opacity:0;pointer-events:none}
.logo-text{font-size:clamp(44px,10vw,88px);font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,var(--cyan),var(--pink),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;line-height:1;margin-bottom:8px;animation:logoGlow 2.5s ease-in-out infinite}
.logo-sub{font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:8px;color:var(--cyan);opacity:.55;margin-bottom:50px}
.btn-primary{background:transparent;border:2px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:4px;padding:15px 44px;cursor:pointer;position:relative;overflow:hidden;transition:all .3s;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%)}
.btn-primary::before{content:'';position:absolute;inset:0;background:var(--cyan);transform:translateX(-100%);transition:transform .3s;z-index:-1}
.btn-primary:hover::before{transform:translateX(0)}
.btn-primary:hover{color:var(--dark)}
.btn-secondary{background:transparent;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.45);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;padding:11px 30px;cursor:pointer;margin-top:14px;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:all .3s}
.btn-secondary:hover{border-color:rgba(255,255,255,.45);color:#fff}

/* Game Over */
.screen-score{font-size:64px;font-weight:900;color:#fff;text-shadow:0 0 30px var(--cyan);margin-bottom:4px}
.screen-label{font-size:9px;letter-spacing:5px;color:var(--cyan);opacity:.55;margin-bottom:36px}
.stats-row{display:flex;gap:36px;margin-bottom:44px}
.stat-item{text-align:center}
.stat-val{font-size:22px;font-weight:700;color:var(--yellow);text-shadow:0 0 10px var(--yellow)}
.stat-lbl{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.35);margin-top:4px}
.new-best{font-size:10px;letter-spacing:4px;color:var(--yellow);margin-bottom:12px;animation:pulse 1s infinite}

/* Mobile touch D-pad */
#dpad{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:99;display:none;gap:0;flex-direction:column;align-items:center}
#dpad-row{display:flex;gap:4px;align-items:center}
.dpad-btn{width:52px;height:52px;background:rgba(0,245,255,.06);border:1px solid rgba(0,245,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.dpad-btn:active{background:rgba(0,245,255,.18);transform:scale(.93)}
.dpad-center{width:52px;height:52px;background:rgba(255,234,0,.06);border:1px solid rgba(255,234,0,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;font-size:9px;letter-spacing:1px;color:rgba(255,234,0,.6)}
.dpad-center:active{background:rgba(255,234,0,.18)}
.dpad-arrow{width:0;height:0}
.arr-up{border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:12px solid rgba(0,245,255,.7)}
.arr-down{border-left:8px solid transparent;border-right:8px solid transparent;border-top:12px solid rgba(0,245,255,.7)}
.arr-left{border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:12px solid rgba(0,245,255,.7)}
.arr-right{border-top:8px solid transparent;border-bottom:8px solid transparent;border-left:12px solid rgba(0,245,255,.7)}

/* Controls hint (desktop) */
#controls-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:99;pointer-events:none}
.ctrl-key{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:5px 10px;font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1px}

/* Score popup */
.score-popup{position:fixed;color:var(--yellow);font-family:'Orbitron',monospace;font-size:18px;font-weight:700;text-shadow:0 0 10px var(--yellow);pointer-events:none;z-index:150;animation:scoreFloat 0.9s ease forwards}

/* Pause overlay */
#pauseScreen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(10px);background:rgba(3,5,15,.85);opacity:0;pointer-events:none;transition:opacity .3s}
#pauseScreen.visible{opacity:1;pointer-events:all}
.pause-title{font-size:40px;font-weight:900;color:var(--cyan);letter-spacing:6px;margin-bottom:10px}
.pause-sub{font-size:10px;letter-spacing:4px;color:rgba(0,245,255,.5);margin-bottom:40px}

@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 20px rgba(0,245,255,.4))}50%{filter:drop-shadow(0 0 50px rgba(255,0,128,.6))}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scoreFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-70px) scale(1.4)}}

.score-popup{position:fixed;pointer-events:none;z-index:150;animation:scoreFloat .9s ease forwards}

/* Scanlines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:300}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="ui-overlay">
  <div id="hud">
    <div id="score-block">
      <div id="score-label">SCORE</div>
      <div id="score-display">0</div>
      <div id="best-row">BEST: <span id="hud-best">0</span></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <button id="pause-btn" onclick="togglePause()">⏸ PAUSE</button>
      <div id="coin-block">
        <div id="coin-icon"></div>
        <div id="coin-display">0</div>
      </div>
    </div>
    <div id="speed-block">
      <div id="speed-label">VITESSE</div>
      <div id="speed-display">1.0x</div>
    </div>
  </div>
  <div id="lives-bar">
    <div id="lives-label">VIES</div>
    <div class="life-orb" id="life0"></div>
    <div class="life-orb" id="life1"></div>
    <div class="life-orb" id="life2"></div>
  </div>
  <div id="boost-container">
    <div id="boost-label">BOOST</div>
    <div id="boost-track"><div id="boost-fill"></div></div>
    <div id="boost-ready">PRÊT — ESPACE</div>
  </div>
</div>

<!-- Desktop controls hint -->
<div id="controls-hint">
  <div class="ctrl-key">← →  VOIE</div>
  <div class="ctrl-key">↑  SAUT</div>
  <div class="ctrl-key">↓  GLISSE</div>
  <div class="ctrl-key">ESPACE  BOOST</div>
  <div class="ctrl-key">P  PAUSE</div>
</div>

<!-- Mobile D-pad -->
<div id="dpad">
  <div style="margin-bottom:4px"><div class="dpad-btn" id="btn-up"><div class="dpad-arrow arr-up"></div></div></div>
  <div id="dpad-row">
    <div class="dpad-btn" id="btn-left"><div class="dpad-arrow arr-left"></div></div>
    <div class="dpad-center" id="btn-boost">⚡</div>
    <div class="dpad-btn" id="btn-right"><div class="dpad-arrow arr-right"></div></div>
  </div>
  <div style="margin-top:4px"><div class="dpad-btn" id="btn-down"><div class="dpad-arrow arr-down"></div></div></div>
</div>

<!-- START SCREEN -->
<div class="screen" id="startScreen">
  <div class="logo-text">NEON<br>DASH</div>
  <div class="logo-sub">CYBER RUNNER 2077</div>
  <button class="btn-primary" onclick="startGame()">JOUER</button>
  <button class="btn-secondary" onclick="showHowTo()">COMMENT JOUER</button>
</div>

<!-- PAUSE SCREEN -->
<div id="pauseScreen">
  <div class="pause-title">PAUSE</div>
  <div class="pause-sub">P OU CLIC POUR CONTINUER</div>
  <button class="btn-primary" onclick="togglePause()">CONTINUER</button>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen hidden" id="gameOverScreen">
  <div class="logo-sub" style="margin-bottom:14px">GAME OVER</div>
  <div class="screen-score" id="finalScore">0</div>
  <div class="screen-label">SCORE FINAL</div>
  <div id="new-best-badge" class="new-best" style="display:none">★ NOUVEAU RECORD ★</div>
  <div class="stats-row">
    <div class="stat-item"><div class="stat-val" id="finalCoins">0</div><div class="stat-lbl">COINS</div></div>
    <div class="stat-item"><div class="stat-val" id="finalDist">0m</div><div class="stat-lbl">DISTANCE</div></div>
    <div class="stat-item"><div class="stat-val" id="bestScore">0</div><div class="stat-lbl">MEILLEUR</div></div>
  </div>
  <button class="btn-primary" onclick="startGame()">REJOUER</button>
  <button class="btn-secondary" onclick="showMenu()">MENU</button>
</div>

<script>
// ===================== CANVAS SETUP =====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
const LANE_COUNT = 3;
let LANE_W, lanes;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  LANE_W = Math.min(W * 0.18, 130);
  lanes = [W/2 - LANE_W, W/2, W/2 + LANE_W];
}
resize();
window.addEventListener('resize', () => { resize(); if(state === 'playing') initPlayer(); });

// ===================== CONSTANTS =====================
const CYAN   = '#00f5ff';
const PINK   = '#ff0080';
const YELLOW = '#ffea00';
const PURPLE = '#8b00ff';
const GREEN  = '#00ff88';
const GRAVITY = 0.65;
const BASE_SPEED = 5;
const GROUND_Y = () => H - 140;
const OBS_TYPES = ['barrier','box','spike','train'];

// ===================== GAME STATE =====================
let state = 'menu'; // menu | playing | paused | dead
let score, coins, distance, frameCount;
let speedMult; // 1.0 at start, increases over time
let lives, invincible, invTimer;
let boostMeter, boosting, boostTimer;
let bestScore = +localStorage.getItem('neonDashBest') || 0;
let gameLoopId = null;

// Player
let laneIdx;
let player;

// World objects
let obstacles, coinsList, powerups, particles, bgLines, bgBuildings;

// Speed line pool for boost effect (pre-computed, not random every frame)
let speedLines = [];

// ===================== UTILITIES =====================
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function scorePopup(x, y, val) {
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.style.cssText = `left:${x-20}px;top:${y-20}px;color:${val>=100?CYAN:YELLOW};font-size:${val>=100?22:16}px;font-family:'Orbitron',monospace;font-weight:700;text-shadow:0 0 10px currentColor`;
  el.textContent = '+' + val;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function spawnParticle(x, y, color, burst=false) {
  const count = burst ? 12 : 1;
  for(let i=0;i<count;i++){
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*(burst?9:4),
      vy: (Math.random()-0.5)*(burst?9:4)-(burst?2:1),
      life:1, decay:burst?0.022:0.04,
      size:Math.random()*(burst?7:4)+2,
      color
    });
  }
}

// ===================== BACKGROUND =====================
function initBackground() {
  bgLines = [];
  for(let i=0;i<7;i++){
    bgLines.push({
      x: Math.random()*W, y: Math.random()*H*0.6,
      w: 80+Math.random()*220,
      speed: 1.5+Math.random()*3
    });
  }

  bgBuildings = [];
  const buildingColors = [CYAN, PINK, PURPLE, '#4488ff'];
  for(let i=0;i<14;i++){
    const bw = 35+Math.random()*65;
    const bh = 60+Math.random()*220;
    const col = buildingColors[Math.floor(Math.random()*buildingColors.length)];
    const b = {
      x: (i/14)*W + (Math.random()*W/14)*0.5,
      w: bw, h: bh, color: col, windows:[]
    };
    for(let wy=bh-18;wy>16;wy-=18){
      for(let wx=5;wx<bw-5;wx+=13){
        if(Math.random()>0.38) b.windows.push({x:wx,y:wy,lit:Math.random()>0.3,flicker:Math.random()<0.05});
      }
    }
    bgBuildings.push(b);
  }

  // Pre-generate speed lines for boost effect
  speedLines = [];
  for(let i=0;i<30;i++){
    speedLines.push({
      x:Math.random()*W, y:Math.random()*H,
      len:60+Math.random()*200,
      angle:(Math.random()-0.5)*0.3,
      speed:8+Math.random()*12
    });
  }
}

function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0,0,0,H*0.72);
  grad.addColorStop(0,'#03050f');
  grad.addColorStop(0.55,'#0a0a2e');
  grad.addColorStop(1,'#0f0520');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H*0.72);

  // Buildings silhouette
  bgBuildings.forEach(b=>{
    const bY = H*0.72-b.h;
    ctx.fillStyle='#070715';
    ctx.fillRect(b.x-b.w/2,bY,b.w,b.h);
    ctx.shadowColor=b.color; ctx.shadowBlur=6;
    ctx.strokeStyle=b.color+'40'; ctx.lineWidth=1;
    ctx.strokeRect(b.x-b.w/2,bY,b.w,b.h);
    ctx.shadowBlur=0;
    b.windows.forEach(win=>{
      if(!win.lit) return;
      const flick = win.flicker && frameCount%180===Math.floor(Math.random()*180);
      if(flick) win.lit=false;
      ctx.fillStyle=frameCount%300<250?'#ffff8838':'#44ffff38';
      ctx.fillRect(b.x-b.w/2+win.x,bY+win.y,7,9);
    });
  });

  // Horizon glow
  ctx.save();
  const hg=ctx.createLinearGradient(0,H*0.62,0,H*0.76);
  hg.addColorStop(0,'rgba(0,245,255,0.12)');
  hg.addColorStop(1,'transparent');
  ctx.fillStyle=hg; ctx.fillRect(0,H*0.62,W,H*0.14);
  ctx.restore();

  // Ambient background grid lines
  ctx.save(); ctx.globalAlpha=0.1;
  bgLines.forEach(l=>{
    ctx.strokeStyle=CYAN; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(l.x,l.y); ctx.lineTo(l.x+l.w,l.y); ctx.stroke();
    l.y+=l.speed*(speedMult||1)*0.6;
    if(l.y>H*0.68){l.y=-5;l.x=Math.random()*W;l.w=80+Math.random()*220;}
  });
  ctx.restore();

  // Boost speed lines (pre-computed pool)
  if(boosting){
    ctx.save(); ctx.globalAlpha=0.35; ctx.strokeStyle=YELLOW; ctx.lineWidth=1.5;
    speedLines.forEach(sl=>{
      ctx.beginPath();
      ctx.moveTo(sl.x,sl.y);
      ctx.lineTo(sl.x+Math.cos(sl.angle)*sl.len,sl.y+Math.sin(sl.angle)*sl.len);
      ctx.stroke();
      sl.x-=sl.speed;
      if(sl.x+sl.len<0){sl.x=W+10;sl.y=Math.random()*H;}
    });
    ctx.restore();
  }
}

// ===================== GROUND =====================
function drawGround() {
  const GY = H-80;
  const roadX = W/2-LANE_W*1.85;
  const roadW = LANE_W*3.7;

  // Ground base
  const gg=ctx.createLinearGradient(0,GY-60,0,H);
  gg.addColorStop(0,'#0a1030'); gg.addColorStop(0.5,'#060c20'); gg.addColorStop(1,'#030510');
  ctx.fillStyle=gg; ctx.fillRect(0,GY-60,W,H-GY+60);

  // Road surface
  ctx.fillStyle='#080d28'; ctx.fillRect(roadX,GY-60,roadW,H-GY+60);

  // Road edge glow lines
  ctx.save(); ctx.shadowColor=CYAN; ctx.shadowBlur=14;
  ctx.strokeStyle=CYAN; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(roadX,GY-60); ctx.lineTo(roadX,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(roadX+roadW,GY-60); ctx.lineTo(roadX+roadW,H); ctx.stroke();
  ctx.restore();

  // Animated lane dashes
  const dashLen=38, dashGap=28, totalLen=dashLen+dashGap;
  const offset=(frameCount*BASE_SPEED*speedMult*0.5)%totalLen;
  for(let l=0;l<2;l++){
    const lx=lanes[l]+LANE_W/2;
    ctx.save(); ctx.strokeStyle=CYAN+'48'; ctx.lineWidth=2;
    ctx.shadowColor=CYAN; ctx.shadowBlur=5;
    for(let dy=-offset;dy<H-GY+60;dy+=totalLen){
      ctx.beginPath();
      ctx.moveTo(lx,GY-60+dy); ctx.lineTo(lx,GY-60+dy+dashLen);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Active lane highlight
  lanes.forEach((lx,i)=>{
    const alpha = i===laneIdx ? 0.22+0.08*Math.sin(frameCount*0.07) : 0.08;
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.strokeStyle=i===laneIdx?CYAN:'#ffffff';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(lx,GY-60); ctx.lineTo(lx,H); ctx.stroke();
    ctx.restore();
  });

  // Perspective grid
  for(let i=0;i<8;i++){
    const t=(i/8);
    const gY=GY-60+t*(H-GY+60);
    ctx.save(); ctx.globalAlpha=0.04+t*0.07;
    ctx.strokeStyle=CYAN; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(roadX,gY); ctx.lineTo(roadX+roadW,gY); ctx.stroke();
    ctx.restore();
  }
}

// ===================== PLAYER =====================
function initPlayer() {
  laneIdx=1;
  player={
    x:lanes[1], targetX:lanes[1],
    y:GROUND_Y(), vy:0,
    onGround:true, sliding:false, slideTimer:0,
    w:36, h:56, trail:[], blink:false
  };
}

function updatePlayer() {
  // Smooth lane lerp
  player.x+=(player.targetX-player.x)*0.22;

  // Gravity
  if(!player.onGround){
    player.vy+=GRAVITY;
    player.y+=player.vy;
  }
  // Land on ground
  if(player.y>=GROUND_Y()){
    player.y=GROUND_Y(); player.vy=0; player.onGround=true;
  }

  // Slide timer
  if(player.sliding){
    player.slideTimer--;
    if(player.slideTimer<=0) player.sliding=false;
  }

  // Invincibility blink
  if(invincible){
    invTimer--;
    player.blink=Math.floor(invTimer/5)%2===0;
    if(invTimer<=0){invincible=false; player.blink=false;}
  }

  // Trail
  player.trail.unshift({
    x:player.x,
    y:player.y+(player.sliding?player.h*0.25:0),
    alpha:1
  });
  if(player.trail.length>14) player.trail.pop();
  player.trail.forEach((t,i)=>t.alpha=1-i/14);
}

function drawPlayer() {
  if(player.blink) return;
  const ph = player.sliding ? player.h*0.5 : player.h;
  const py = player.sliding ? player.y+player.h*0.5 : player.y;
  const px = player.x;
  const color = boosting ? YELLOW : CYAN;

  // Trail
  player.trail.forEach((t,i)=>{
    ctx.save();
    ctx.globalAlpha=t.alpha*0.35;
    ctx.fillStyle=color;
    const trailPH=player.sliding?ph*0.55:ph*0.5;
    ctx.ellipse(t.x,t.y+ph/2,player.w*0.35*(1-i/14),trailPH*0.4*(1-i/14),0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  ctx.save();
  ctx.translate(px,py+ph/2);
  ctx.shadowColor=color; ctx.shadowBlur=boosting?36:18;

  // Body
  ctx.fillStyle='#001520';
  roundRect(ctx,-player.w/2,-ph/2,player.w,ph,7);
  ctx.fill();
  ctx.strokeStyle=color; ctx.lineWidth=2.5;
  roundRect(ctx,-player.w/2,-ph/2,player.w,ph,7);
  ctx.stroke();

  // Circuit lines
  ctx.strokeStyle=color+'55'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(-player.w/4,-ph/2+7); ctx.lineTo(-player.w/4,ph/2-7);
  ctx.moveTo(player.w/4,-ph/2+7);  ctx.lineTo(player.w/4,ph/2-7);
  ctx.moveTo(-player.w/2+5,0);     ctx.lineTo(player.w/2-5,0);
  ctx.stroke();

  // Head
  ctx.fillStyle=color; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.ellipse(0,-ph/2+9,player.w/3,7,0,0,Math.PI*2); ctx.fill();

  // Eyes
  const eyeCol = boosting ? PINK : '#00ffaa';
  ctx.fillStyle=eyeCol; ctx.shadowColor=eyeCol; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.ellipse(-6,-ph/2+9,3.5,2.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6,-ph/2+9,3.5,2.5,0,0,Math.PI*2); ctx.fill();

  // Boost aura ring
  if(boosting){
    ctx.globalAlpha=0.25+0.15*Math.sin(frameCount*0.3);
    ctx.strokeStyle=YELLOW; ctx.lineWidth=3; ctx.shadowColor=YELLOW; ctx.shadowBlur=20;
    roundRect(ctx,-player.w/2-5,-ph/2-5,player.w+10,ph+10,12);
    ctx.stroke();
  }

  ctx.restore();
}

// ===================== OBSTACLES =====================
function spawnObstacle() {
  const type = OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)];
  const lane = Math.floor(Math.random()*3);

  let obs={x:lanes[lane], y:-80, laneIdx:lane, type, dead:false, w:44, h:55};

  if(type==='barrier') { obs.w=50; obs.h=80; }
  else if(type==='train'){
    // Train spans two adjacent lanes — pick safely
    const l1 = lane<2?lane:1;
    const l2 = l1+1;
    obs.laneIdx=l1;
    obs.laneIdx2=l2;
    obs.x=lanes[l1]; obs.x2=lanes[l2];
    obs.w=56; obs.h=88;
  }
  else if(type==='box')  { obs.w=40; obs.h=38; obs.y=GROUND_Y()-obs.h/2+4; obs.low=true; }
  else if(type==='spike'){ obs.w=48; obs.h=28; obs.y=GROUND_Y()-obs.h/2+4; obs.low=true; }

  obstacles.push(obs);
}

function drawObstacles() {
  obstacles.forEach(obs=>{
    if(obs.dead) return;
    ctx.save();

    if(obs.type==='train'){
      // Draw connecting body between two lane positions
      const x1=obs.x, x2=obs.x2;
      const cx=(x1+x2)/2;
      const trainW=Math.abs(x2-x1)+obs.w;
      ctx.translate(cx,obs.y+obs.h/2);
      ctx.shadowColor='#ff4400'; ctx.shadowBlur=22;
      ctx.fillStyle='#1a0600';
      roundRect(ctx,-trainW/2,-obs.h/2,trainW,obs.h,8); ctx.fill();
      ctx.strokeStyle='#ff4400'; ctx.lineWidth=2.5;
      roundRect(ctx,-trainW/2,-obs.h/2,trainW,obs.h,8); ctx.stroke();
      for(let wy=-obs.h/2+10;wy<obs.h/2-10;wy+=20){
        ctx.fillStyle='#ff440022'; ctx.fillRect(-trainW/2+8,wy,trainW-16,12);
      }
      // Hazard stripes
      ctx.strokeStyle='#ff440066'; ctx.lineWidth=1.5;
      for(let sx=-trainW/2+20;sx<trainW/2-10;sx+=18){
        ctx.beginPath(); ctx.moveTo(sx,-obs.h/2+2); ctx.lineTo(sx+8,obs.h/2-2); ctx.stroke();
      }
    } else {
      ctx.translate(obs.x,obs.y+obs.h/2);
      if(obs.type==='barrier'){
        ctx.shadowColor=PINK; ctx.shadowBlur=20;
        ctx.fillStyle='#1a0010';
        roundRect(ctx,-obs.w/2,-obs.h/2,obs.w,obs.h,6); ctx.fill();
        ctx.strokeStyle=PINK; ctx.lineWidth=2.5;
        roundRect(ctx,-obs.w/2,-obs.h/2,obs.w,obs.h,6); ctx.stroke();
        // X
        ctx.strokeStyle=PINK+'bb'; ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(-obs.w/3,-obs.h/3); ctx.lineTo(obs.w/3,obs.h/3);
        ctx.moveTo(obs.w/3,-obs.h/3);  ctx.lineTo(-obs.w/3,obs.h/3);
        ctx.stroke();
      } else if(obs.type==='box'){
        ctx.shadowColor='#ff8800'; ctx.shadowBlur=14;
        ctx.fillStyle='#1a0e00';
        roundRect(ctx,-obs.w/2,-obs.h/2,obs.w,obs.h,5); ctx.fill();
        ctx.strokeStyle='#ff8800'; ctx.lineWidth=2;
        roundRect(ctx,-obs.w/2,-obs.h/2,obs.w,obs.h,5); ctx.stroke();
        ctx.strokeStyle='#ff880055'; ctx.lineWidth=1;
        roundRect(ctx,-obs.w/2+4,-obs.h/2+4,obs.w-8,obs.h-8,3); ctx.stroke();
      } else if(obs.type==='spike'){
        ctx.shadowColor=PINK; ctx.shadowBlur=10;
        ctx.fillStyle=PINK;
        for(let s=-2;s<=2;s++){
          ctx.beginPath();
          ctx.moveTo(s*10,obs.h/2);
          ctx.lineTo(s*10-5.5,-obs.h/2);
          ctx.lineTo(s*10+5.5,-obs.h/2);
          ctx.closePath(); ctx.fill();
        }
      }
    }
    ctx.restore();
  });
}

// ===================== COINS =====================
function spawnCoin() {
  const lane=Math.floor(Math.random()*3);
  const count=Math.random()>0.55?5:1;
  for(let i=0;i<count;i++){
    coinsList.push({x:lanes[lane],y:-60-i*42,w:20,h:20,spin:0,dead:false});
  }
}

function drawCoins() {
  coinsList.forEach(c=>{
    if(c.dead) return;
    c.spin=(c.spin+0.1)%(Math.PI*2);
    const scaleX=Math.abs(Math.cos(c.spin));
    ctx.save();
    ctx.translate(c.x,c.y); ctx.scale(scaleX,1);
    ctx.shadowColor=YELLOW; ctx.shadowBlur=14;
    ctx.fillStyle=YELLOW;
    ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#fffaa0'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
    // Shine dot
    ctx.save();
    ctx.translate(c.x,c.y); ctx.globalAlpha=0.5;
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(-2.5,-2.5,3.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ===================== POWERUPS =====================
function spawnPowerup() {
  const lane=Math.floor(Math.random()*3);
  powerups.push({
    x:lanes[lane], y:-70,
    type:Math.random()>0.5?'boost':'shield',
    w:28, h:28, pulse:0, dead:false
  });
}

function drawPowerups() {
  powerups.forEach(p=>{
    if(p.dead) return;
    p.pulse=(p.pulse+0.08)%(Math.PI*2);
    const s=1+0.15*Math.sin(p.pulse);
    ctx.save();
    ctx.translate(p.x,p.y); ctx.scale(s,s);
    if(p.type==='boost'){
      ctx.shadowColor=YELLOW; ctx.shadowBlur=28;
      ctx.fillStyle=YELLOW;
      ctx.beginPath();
      ctx.moveTo(4,-14);ctx.lineTo(-4,0);ctx.lineTo(2,0);
      ctx.lineTo(-4,14);ctx.lineTo(4,0);ctx.lineTo(-2,0);
      ctx.closePath(); ctx.fill();
    } else {
      ctx.shadowColor=GREEN; ctx.shadowBlur=28;
      ctx.strokeStyle=GREEN; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle=GREEN+'33'; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(-4,0);ctx.lineTo(-1,4);ctx.lineTo(5,-5); ctx.stroke();
    }
    ctx.restore();
  });
}

// ===================== PARTICLES =====================
function drawParticles() {
  particles.forEach(p=>{
    ctx.save();
    ctx.globalAlpha=p.life;
    ctx.shadowColor=p.color; ctx.shadowBlur=8;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    ctx.restore();
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=p.decay;
  });
  particles=particles.filter(p=>p.life>0);
}

// ===================== COLLISION =====================
function checkCollisions() {
  const ph = player.sliding ? player.h*0.5 : player.h;
  const py = player.sliding ? player.y+player.h*0.5 : player.y;
  const px = player.x;
  const pHalfW = player.w/2-5;
  const pHalfH = ph/2-5;

  for(const obs of obstacles){
    if(obs.dead) continue;

    // Get all X positions this obstacle occupies
    const obsXList = obs.type==='train' ? [obs.x, obs.x2] : [obs.x];

    for(const ox of obsXList){
      const dx=Math.abs(px-ox);
      const oy_center=obs.y+obs.h/2;
      const dy=Math.abs((py+ph/2)-oy_center);
      const hit=dx<(pHalfW+obs.w/2-4) && dy<(pHalfH+obs.h/2-4);

      if(hit){
        if(boosting){
          obs.dead=true;
          spawnParticle(obs.x,obs.y+obs.h/2,YELLOW,true);
          addScore(50,obs.x,obs.y);
        } else if(!invincible){
          obs.dead=true;
          lives--;
          updateLivesUI();
          spawnParticle(px,py+ph/2,PINK,true);
          if(lives<=0){ gameOver(); return; }
          invincible=true; invTimer=130;
        }
        break;
      }
    }
  }

  for(const c of coinsList){
    if(c.dead) continue;
    if(Math.abs(px-c.x)<28 && Math.abs((py+ph/2)-c.y)<36){
      c.dead=true; coins++;
      boostMeter=clamp(boostMeter+12,0,100);
      updateBoostUI();
      addScore(10,c.x,c.y);
      spawnParticle(c.x,c.y,YELLOW);
    }
  }

  for(const p of powerups){
    if(p.dead) continue;
    if(Math.abs(px-p.x)<34 && Math.abs((py+ph/2)-p.y)<44){
      p.dead=true;
      if(p.type==='boost'){ boostMeter=100; updateBoostUI(); }
      if(p.type==='shield'){ invincible=true; invTimer=320; }
      spawnParticle(p.x,p.y,p.type==='boost'?YELLOW:GREEN,true);
      addScore(100,p.x,p.y);
    }
  }
}

function addScore(val, x, y) {
  score+=val;
  scorePopup(x,y,val);
}

// ===================== SPAWNING =====================
let spawnTimer=0, coinTimer=0, powerTimer=0;
const spawnRate = ()=>Math.max(38,85-frameCount*0.016);

// ===================== UI UPDATES =====================
function updateLivesUI(){
  for(let i=0;i<3;i++) document.getElementById('life'+i).classList.toggle('dead',i>=lives);
}
function updateBoostUI(){
  document.getElementById('boost-fill').style.width=boostMeter+'%';
  document.getElementById('boost-ready').style.opacity=boostMeter>=100?'1':'0';
}
function updateHUD(){
  document.getElementById('score-display').textContent=score;
  document.getElementById('coin-display').textContent=coins;
  const mult=boosting?speedMult/2.5:speedMult; // show base mult, not boosted
  document.getElementById('speed-display').textContent=(boosting?'⚡':'')+speedMult.toFixed(1)+'x';
  document.getElementById('hud-best').textContent=bestScore;
}

// ===================== ACTIONS =====================
function moveLeft()  { if(laneIdx>0){ laneIdx--; player.targetX=lanes[laneIdx]; spawnParticle(player.x,player.y+player.h/2,CYAN); } }
function moveRight() { if(laneIdx<2){ laneIdx++; player.targetX=lanes[laneIdx]; spawnParticle(player.x,player.y+player.h/2,CYAN); } }

function jump() {
  if(player.onGround){
    player.vy=-15.5; player.onGround=false; player.sliding=false;
    for(let i=0;i<8;i++) spawnParticle(player.x,player.y+player.h/2,CYAN);
  }
}
function slideDown() {
  if(player.onGround&&!player.sliding){
    player.sliding=true; player.slideTimer=65;
    for(let i=0;i<6;i++) spawnParticle(player.x,player.y+player.h/2,PURPLE);
  }
}
function activateBoost() {
  if(boostMeter>=100&&!boosting){
    boosting=true; boostTimer=180; boostMeter=0; updateBoostUI();
    for(let i=0;i<15;i++) spawnParticle(player.x,player.y+player.h/2,YELLOW);
  }
}

// ===================== INPUT =====================
document.addEventListener('keydown',e=>{
  if(state==='menu') return;
  if(e.key==='p'||e.key==='P'||e.key==='Escape'){ togglePause(); return; }
  if(state!=='playing') return;
  if(e.key==='ArrowLeft')  { moveLeft(); e.preventDefault(); }
  if(e.key==='ArrowRight') { moveRight(); e.preventDefault(); }
  if(e.key==='ArrowUp')    { jump(); e.preventDefault(); }
  if(e.key==='ArrowDown')  { slideDown(); e.preventDefault(); }
  if(e.key===' ')          { activateBoost(); e.preventDefault(); }
});

// Mobile buttons
function addTap(id, fn){
  const el=document.getElementById(id);
  if(!el) return;
  el.addEventListener('touchstart',e=>{if(state==='playing')fn();e.preventDefault();},{passive:false});
  el.addEventListener('mousedown',e=>{if(state==='playing')fn();e.preventDefault();});
}
addTap('btn-left',moveLeft);
addTap('btn-right',moveRight);
addTap('btn-up',jump);
addTap('btn-down',slideDown);
addTap('btn-boost',activateBoost);

// Swipe fallback
let touchStartX=0, touchStartY=0;
canvas.addEventListener('touchstart',e=>{ touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; },{passive:true});
canvas.addEventListener('touchend',e=>{
  if(state!=='playing') return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)){ if(dx<-30)moveLeft(); else if(dx>30)moveRight(); }
  else{ if(dy<-40)jump(); else if(dy>30)slideDown(); }
},{passive:true});

// Detect touch device
function checkTouchDevice(){
  if('ontouchstart' in window || navigator.maxTouchPoints>0){
    document.getElementById('dpad').style.display='flex';
    document.getElementById('dpad').style.flexDirection='column';
    document.getElementById('controls-hint').style.display='none';
  }
}

// ===================== GAME FLOW =====================
function startGame() {
  state='playing';
  score=0; coins=0; distance=0; frameCount=0;
  speedMult=1; lives=3;
  invincible=false; invTimer=0;
  boostMeter=0; boosting=false; boostTimer=0;
  obstacles=[]; coinsList=[]; powerups=[]; particles=[];
  spawnTimer=0; coinTimer=0; powerTimer=0;
  updateLivesUI(); updateBoostUI(); updateHUD();
  initPlayer();
  initBackground();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  checkTouchDevice();
  if(gameLoopId) cancelAnimationFrame(gameLoopId);
  gameLoopId=requestAnimationFrame(loop);
}

function showMenu() {
  state='menu';
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}

function togglePause() {
  if(state==='playing'){
    state='paused';
    document.getElementById('pauseScreen').classList.add('visible');
    document.getElementById('pause-btn').textContent='▶ REPRISE';
  } else if(state==='paused'){
    state='playing';
    document.getElementById('pauseScreen').classList.remove('visible');
    document.getElementById('pause-btn').textContent='⏸ PAUSE';
    gameLoopId=requestAnimationFrame(loop);
  }
}

function showHowTo(){
  alert('← → : Changer de voie\n↑ : Sauter (double tap zone haut mobile)\n↓ : Glisser sous les obstacles\nESPACE / ⚡ : Activer le Boost (détruire les obstacles!)\nP : Pause\n\nCollecte les pièces ◉ pour charger le boost.\nLes power-ups ⚡ remplissent le boost instantanément.\nLes boucliers 🛡 donnent une invincibilité temporaire.');
}

function gameOver() {
  state='dead';
  const isNew=score>bestScore;
  if(isNew){ bestScore=score; localStorage.setItem('neonDashBest',bestScore); }
  // Death burst
  for(let i=0;i<50;i++) spawnParticle(player.x,player.y+player.h/2,PINK,false);
  // Draw last frame with particles, then show screen
  setTimeout(()=>{
    document.getElementById('finalScore').textContent=score;
    document.getElementById('finalCoins').textContent=coins;
    document.getElementById('finalDist').textContent=Math.floor(distance)+'m';
    document.getElementById('bestScore').textContent=bestScore;
    document.getElementById('new-best-badge').style.display=isNew?'block':'none';
    document.getElementById('gameOverScreen').classList.remove('hidden');
  },400);
}

// ===================== UPDATE =====================
function update() {
  frameCount++;
  distance+=BASE_SPEED*speedMult*0.05;

  // Smooth speed progression (no exponential bug)
  speedMult=1+frameCount*0.00028;
  if(boosting) speedMult*=2.4;

  // Passive score
  score+=Math.ceil(speedMult*0.4);

  // Boost countdown
  if(boosting){
    boostTimer--;
    if(boostTimer<=0){ boosting=false; }
  }

  // Spawning
  spawnTimer++;
  if(spawnTimer>=spawnRate()){ spawnObstacle(); spawnTimer=0; }
  coinTimer++;
  if(coinTimer>=48){ spawnCoin(); coinTimer=0; }
  powerTimer++;
  if(powerTimer>=420){ spawnPowerup(); powerTimer=0; }

  // Move world objects by base speed * multiplier (not raw speedMult squared)
  const spd=BASE_SPEED*(boosting?speedMult/2.4:speedMult);
  obstacles.forEach(o=>{ o.y+=spd; if(o.x2!==undefined) o.x2=o.x2; }); // x2 stays fixed
  coinsList.forEach(c=>c.y+=spd*0.88);
  powerups.forEach(p=>p.y+=spd*0.88);

  // Cull off-screen
  obstacles=obstacles.filter(o=>!o.dead&&o.y<H+120);
  coinsList=coinsList.filter(c=>!c.dead&&c.y<H+60);
  powerups=powerups.filter(p=>!p.dead&&p.y<H+60);

  updatePlayer();
  checkCollisions();
  updateHUD();
}

// ===================== MAIN LOOP =====================
function loop() {
  if(state!=='playing') return;
  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawGround();
  drawParticles();
  drawObstacles();
  drawCoins();
  drawPowerups();
  drawPlayer();
  update();
  gameLoopId=requestAnimationFrame(loop);
}

// ===================== INIT =====================
document.getElementById('hud-best').textContent=bestScore;
initBackground();
</script>
